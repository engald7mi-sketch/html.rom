<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة العيادة | Clinic System</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
      background-color: #f4f6f8;
      color: #333;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background-color: #007bff;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }
    li {
      background: #eef2f5;
      padding: 10px 15px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>نظام العيادات - إضافة مستخدم</h2>
    
    <!-- نموذج إدخال البيانات -->
    <input type="text" id="username" placeholder="أدخل اسم المستخدم أو الأخصائي">
    <button id="saveBtn">حفظ البيانات سحابياً</button>

    <h3>المستخدمين المسجلين (مباشر من السحابة):</h3>
    <ul id="usersList">
      <li>جاري تحميل البيانات...</li>
    </ul>
  </div>

  <!-- ربط Realtime Database -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // إعدادات المشروع مع رابط Realtime Database
    const firebaseConfig = {
      apiKey: "AIzaSyC2SqWsDrS1NfPw611jWN_Qi1PsbmQxm9Q",
      authDomain: "clinicsystem-936a1.firebaseapp.com",
      databaseURL: "https://clinicsystem-936a1-default-rtdb.firebaseio.com",
      projectId: "clinicsystem-936a1",
      storageBucket: "clinicsystem-936a1.firebasestorage.app",
      messagingSenderId: "106870276867",
      appId: "1:106870276867:web:163ef64b726da6953b9f36",
      measurementId: "G-40B0X58P2C"
    };

    // تشغيل الفايربيس وقاعدة البيانات
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const usersRef = ref(db, 'users');

    const usernameInput = document.getElementById('username');
    const saveBtn = document.getElementById('saveBtn');
    const usersList = document.getElementById('usersList');

    // 1. حفظ بيانات جديدة سحابياً
    saveBtn.addEventListener('click', () => {
      const name = usernameInput.value.trim();
      if (name === '') return alert('يرجى كتابة الاسم أولاً');

      push(usersRef, {
        name: name,
        createdAt: Date.now()
      }).then(() => {
        usernameInput.value = '';
      }).catch((error) => {
        console.error("خطأ في الحفظ:", error);
        alert("حدث خطأ أثناء الحفظ! تأكد من إعدادات Rules في Firebase");
      });
    });

    // 2. تحديث الشاشة فوراً عند الجميع وبدون إعادة تحميل
    onValue(usersRef, (snapshot) => {
      usersList.innerHTML = '';
      const data = snapshot.val();
      
      if (!data) {
        usersList.innerHTML = '<li>لا توجد بيانات مسجلة حالياً</li>';
        return;
      }

      Object.keys(data).forEach((key) => {
        const li = document.createElement('li');
        li.textContent = data[key].name;
        usersList.appendChild(li);
      });
    });
  </script>

</body>
</html>
